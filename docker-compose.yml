version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_mektep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    tmpfs:
      - /piston/jobs
    privileged: true

volumes:
  postgres_data:
